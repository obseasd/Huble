<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">
  <div class="row" style="margin-bottom:12px"><span class="label">Semantic tokens</span></div>
  <div class="grid" style="grid-template-columns:1fr 1fr;gap:10px">
    <div class="row" style="gap:10px"><div style="width:28px;height:28px;background:var(--black);border-radius:8px"></div><div><div style="font-family:var(--font-heading);font-weight:600;font-size:13px">text-primary</div><div class="mono">#1A1A1A</div></div></div>
    <div class="row" style="gap:10px"><div style="width:28px;height:28px;background:var(--dark);border-radius:8px"></div><div><div style="font-family:var(--font-heading);font-weight:600;font-size:13px">text-secondary</div><div class="mono">#2D2D2D</div></div></div>
    <div class="row" style="gap:10px"><div style="width:28px;height:28px;background:var(--gray);border-radius:8px"></div><div><div style="font-family:var(--font-heading);font-weight:600;font-size:13px">text-muted</div><div class="mono">#6B7280</div></div></div>
    <div class="row" style="gap:10px"><div style="width:28px;height:28px;background:var(--mint-darker);border-radius:8px"></div><div><div style="font-family:var(--font-heading);font-weight:600;font-size:13px">accent / eyebrow</div><div class="mono">#5AB87E</div></div></div>
    <div class="row" style="gap:10px"><div style="width:28px;height:28px;background:var(--mint-lighter);border-radius:8px;border:1px solid rgba(0,0,0,0.06)"></div><div><div style="font-family:var(--font-heading);font-weight:600;font-size:13px">surface-muted</div><div class="mono">#E5F5EC</div></div></div>
    <div class="row" style="gap:10px"><div style="width:28px;height:28px;background:var(--danger);border-radius:8px"></div><div><div style="font-family:var(--font-heading);font-weight:600;font-size:13px">danger (forms)</div><div class="mono">#E74C3C</div></div></div>
  </div>
</div></body></html>
