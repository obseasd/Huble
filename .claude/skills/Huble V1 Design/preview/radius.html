<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">
  <div class="row" style="margin-bottom:12px"><span class="label">Radius scale</span></div>
  <div class="row" style="gap:10px;align-items:flex-end">
    <div class="col" style="align-items:center;gap:6px"><div style="width:80px;height:80px;background:var(--mint);border-radius:10px"></div><div style="font-family:var(--font-heading);font-weight:600;font-size:12px">sm · 10</div></div>
    <div class="col" style="align-items:center;gap:6px"><div style="width:80px;height:80px;background:var(--mint);border-radius:16px"></div><div style="font-family:var(--font-heading);font-weight:600;font-size:12px">md · 16</div></div>
    <div class="col" style="align-items:center;gap:6px"><div style="width:80px;height:80px;background:var(--mint);border-radius:24px"></div><div style="font-family:var(--font-heading);font-weight:600;font-size:12px">lg · 24</div></div>
    <div class="col" style="align-items:center;gap:6px"><div style="width:80px;height:80px;background:var(--mint);border-radius:32px"></div><div style="font-family:var(--font-heading);font-weight:600;font-size:12px">xl · 32</div></div>
    <div class="col" style="align-items:center;gap:6px"><div style="width:80px;height:80px;background:var(--mint);border-radius:9999px"></div><div style="font-family:var(--font-heading);font-weight:600;font-size:12px">full · pill</div></div>
  </div>
</div></body></html>
