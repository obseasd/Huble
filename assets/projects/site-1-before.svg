<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#d0d0d0"/>
  <!-- Browser chrome -->
  <rect x="40" y="30" width="720" height="440" fill="#e8e8e8" stroke="#999" stroke-width="2" rx="4"/>
  <rect x="40" y="30" width="720" height="35" fill="#bbb" rx="4"/>
  <circle cx="62" cy="48" r="6" fill="#e74c3c"/>
  <circle cx="82" cy="48" r="6" fill="#f1c40f"/>
  <circle cx="102" cy="48" r="6" fill="#999"/>
  <rect x="140" y="40" width="400" height="16" fill="#fff" rx="3"/>
  <!-- Ugly nav bar -->
  <rect x="40" y="65" width="720" height="40" fill="#666"/>
  <rect x="60" y="73" width="80" height="22" fill="#888" rx="2"/>
  <rect x="160" y="73" width="60" height="22" fill="#888" rx="2"/>
  <rect x="240" y="73" width="70" height="22" fill="#888" rx="2"/>
  <rect x="330" y="73" width="55" height="22" fill="#888" rx="2"/>
  <rect x="620" y="73" width="120" height="22" fill="#c0392b" rx="2"/>
  <!-- Messy content blocks -->
  <rect x="60" y="120" width="320" height="180" fill="#ccc" stroke="#aaa" stroke-width="1"/>
  <line x1="80" y1="150" x2="360" y2="150" stroke="#999" stroke-width="2"/>
  <line x1="80" y1="170" x2="340" y2="170" stroke="#999" stroke-width="2"/>
  <line x1="80" y1="190" x2="300" y2="190" stroke="#999" stroke-width="2"/>
  <line x1="80" y1="210" x2="350" y2="210" stroke="#999" stroke-width="2"/>
  <line x1="80" y1="230" x2="280" y2="230" stroke="#999" stroke-width="2"/>
  <rect x="80" y="250" width="100" height="30" fill="#c0392b" rx="2"/>
  <!-- Ugly sidebar -->
  <rect x="400" y="120" width="340" height="80" fill="#b0b0b0" stroke="#aaa" stroke-width="1"/>
  <rect x="400" y="210" width="340" height="80" fill="#b8b8b8" stroke="#aaa" stroke-width="1"/>
  <rect x="400" y="300" width="340" height="60" fill="#b0b0b0" stroke="#aaa" stroke-width="1"/>
  <!-- Clashing colors -->
  <rect x="60" y="320" width="150" height="100" fill="#c0392b" rx="2"/>
  <rect x="230" y="320" width="150" height="100" fill="#7f8c8d" rx="2"/>
  <rect x="400" y="370" width="340" height="50" fill="#c0392b" rx="2"/>
  <!-- Ugly footer -->
  <rect x="40" y="430" width="720" height="40" fill="#555"/>
  <!-- Label -->
  <rect x="280" y="200" width="240" height="60" fill="rgba(0,0,0,0.7)" rx="8"/>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e74c3c">Ancien site</text>
</svg>