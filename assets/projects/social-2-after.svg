<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#f0faf3"/>
  <!-- Feed mockup - clean grid -->
  <rect x="50" y="30" width="700" height="440" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" rx="12"/>
  <!-- Header -->
  <rect x="50" y="30" width="700" height="45" fill="#fafafa" rx="12"/>
  <rect x="70" y="44" width="90" height="16" fill="#A2DBB6" rx="8"/>
  <circle cx="690" cy="52" r="10" fill="#e8f5ec"/>
  <circle cx="720" cy="52" r="10" fill="#e8f5ec"/>
  <!-- Beautiful consistent grid -->
  <rect x="70" y="90" width="210" height="130" fill="#e8f5ec" rx="8"/>
  <rect x="295" y="90" width="210" height="130" fill="#d4edda" rx="8"/>
  <rect x="520" y="90" width="210" height="130" fill="#e8f5ec" rx="8"/>
  <!-- Row 2 -->
  <rect x="70" y="235" width="210" height="130" fill="#d4edda" rx="8"/>
  <rect x="295" y="235" width="210" height="130" fill="#e8f5ec" rx="8"/>
  <rect x="520" y="235" width="210" height="130" fill="#d4edda" rx="8"/>
  <!-- Row 3 -->
  <rect x="70" y="380" width="210" height="75" fill="#e8f5ec" rx="8"/>
  <rect x="295" y="380" width="210" height="75" fill="#d4edda" rx="8"/>
  <rect x="520" y="380" width="210" height="75" fill="#e8f5ec" rx="8"/>
  <!-- Subtle icons in grid cells -->
  <circle cx="175" cy="155" r="20" fill="#A2DBB6" opacity="0.4"/>
  <circle cx="400" cy="155" r="20" fill="#A2DBB6" opacity="0.3"/>
  <circle cx="625" cy="155" r="20" fill="#A2DBB6" opacity="0.4"/>
  <circle cx="175" cy="300" r="20" fill="#A2DBB6" opacity="0.3"/>
  <circle cx="400" cy="300" r="20" fill="#A2DBB6" opacity="0.4"/>
  <circle cx="625" cy="300" r="20" fill="#A2DBB6" opacity="0.3"/>
  <!-- Label -->
  <rect x="280" y="210" width="240" height="60" fill="rgba(0,0,0,0.7)" rx="8"/>
  <text x="400" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#A2DBB6">Apres</text>
</svg>