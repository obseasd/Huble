<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ddd"/>
  <!-- Slow loading bar -->
  <rect x="100" y="40" width="600" height="30" fill="#bbb" rx="15"/>
  <rect x="100" y="40" width="120" height="30" fill="#c0392b" rx="15"/>
  <!-- Spreadsheet mockup - messy -->
  <rect x="60" y="90" width="680" height="300" fill="#f5f5f0" stroke="#999" stroke-width="2" rx="4"/>
  <!-- Header row -->
  <rect x="60" y="90" width="680" height="30" fill="#888"/>
  <line x1="160" y1="90" x2="160" y2="390" stroke="#ccc" stroke-width="1"/>
  <line x1="280" y1="90" x2="280" y2="390" stroke="#ccc" stroke-width="1"/>
  <line x1="400" y1="90" x2="400" y2="390" stroke="#ccc" stroke-width="1"/>
  <line x1="520" y1="90" x2="520" y2="390" stroke="#ccc" stroke-width="1"/>
  <line x1="640" y1="90" x2="640" y2="390" stroke="#ccc" stroke-width="1"/>
  <!-- Rows -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="180" x2="740" y2="180" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="210" x2="740" y2="210" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="240" x2="740" y2="240" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="270" x2="740" y2="270" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="300" x2="740" y2="300" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="330" x2="740" y2="330" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="360" x2="740" y2="360" stroke="#ddd" stroke-width="1"/>
  <!-- Some cell data -->
  <rect x="70" y="125" width="70" height="12" fill="#999" rx="2"/>
  <rect x="170" y="125" width="80" height="12" fill="#aaa" rx="2"/>
  <rect x="290" y="125" width="60" height="12" fill="#999" rx="2"/>
  <rect x="410" y="155" width="90" height="12" fill="#c0392b" rx="2"/>
  <rect x="530" y="185" width="70" height="12" fill="#999" rx="2"/>
  <rect x="650" y="215" width="60" height="12" fill="#c0392b" rx="2"/>
  <rect x="70" y="245" width="80" height="12" fill="#aaa" rx="2"/>
  <rect x="290" y="275" width="90" height="12" fill="#999" rx="2"/>
  <!-- Error highlights -->
  <rect x="400" y="150" width="120" height="28" fill="none" stroke="#c0392b" stroke-width="2"/>
  <rect x="640" y="210" width="100" height="28" fill="none" stroke="#c0392b" stroke-width="2"/>
  <!-- Manual task icons at bottom -->
  <rect x="100" y="410" width="120" height="60" fill="#999" rx="5"/>
  <rect x="250" y="410" width="120" height="60" fill="#888" rx="5"/>
  <rect x="400" y="410" width="120" height="60" fill="#999" rx="5"/>
  <rect x="550" y="410" width="120" height="60" fill="#888" rx="5"/>
  <!-- Slow arrows between tasks -->
  <text x="232" y="445" font-family="Arial" font-size="24" fill="#c0392b">...</text>
  <text x="382" y="445" font-family="Arial" font-size="24" fill="#c0392b">...</text>
  <text x="532" y="445" font-family="Arial" font-size="24" fill="#c0392b">...</text>
  <!-- Label -->
  <rect x="280" y="210" width="240" height="60" fill="rgba(0,0,0,0.75)" rx="8"/>
  <text x="400" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e74c3c">Avant</text>
</svg>